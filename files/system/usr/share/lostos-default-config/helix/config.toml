theme = "edge-neon"

[editor]
line-number = "relative"
mouse = false

[editor.statusline]
left = ["mode", "spinner"]
center = ["file-name", "primary-selection-length", "selections", "position", "file-encoding"]
right = ["diagnostics", "version-control"]
separator = "|"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"
