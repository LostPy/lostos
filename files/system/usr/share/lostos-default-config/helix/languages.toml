
[language-server.ruff]
command = "ruff"
args = ["server"]

[language-server.ty]
command = "ty"
args = ["server"]


[[language]]
name = "python"
language-servers = ["ruff", "ty", "pylsp"]
auto-format = true
formatter = { command = "ruff", args = ["format", "-"] }

[[language]]
name = "blueprint"
scope = "source.blp"
file-types = ["blp"]
comment-token = "//"
indent = {tab-width = 2, unit = "  "}
